id: repomap_npe_crossfile_001
category: 空指针
dimension: logic
capability: [repo-map, file]
description: >
  codeOf 对 repository.findCode 的返回值直接 .trim()。diff 只显示 OrderController 里新增的 codeOf,
  findCode 的实现在**另一个文件** OrderRepository.java 里——必须先用 get_repo_map 定位 findCode 在哪个文件,
  再 get_file_content 读它,才能看到它用 Map.get 实现、找不到返回 null,因此 .trim() 会触发 NPE。
  这是"跨文件、diff-only 看着没问题、必须导航+细读才暴露"的难例(对照 file_npe_contract_001 是同文件版)。
repo_path: repo
expected:
  - type_keywords: ["空指针", "npe", "null", "null pointer"]
    file: OrderController.java
    line: 12
    tolerance: 3
    severity: WARNING
    note: findCode 经 Map.get 可能返回 null,未判空即 .trim(),存在跨文件 NPE 风险
