id: command_injection_001
category: 命令注入
language: java
description: 用户输入拼进 shell 命令交给 Runtime.exec
diff: |
  diff --git a/src/main/java/com/demo/PingService.java b/src/main/java/com/demo/PingService.java
  index 1111111..2222222 100644
  --- a/src/main/java/com/demo/PingService.java
  +++ b/src/main/java/com/demo/PingService.java
  @@ -5,6 +5,9 @@ public class PingService {
       public String ping(String host) throws IOException {
  +        String cmd = "ping -c 1 " + host;
  +        Process p = Runtime.getRuntime().exec(cmd);
  +        return new String(p.getInputStream().readAllBytes());
       }
   }
expected:
  - type_keywords: ["命令注入", "command", "injection", "exec"]
    file: PingService.java
    line: 7
    severity: CRITICAL
    note: host 未校验直接拼进系统命令
