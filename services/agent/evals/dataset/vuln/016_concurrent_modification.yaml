id: concurrent_modification_001
category: 并发修改
dimension: logic
language: java
description: for-each 遍历集合时调用 remove,触发 ConcurrentModificationException
diff: |
  diff --git a/src/main/java/com/demo/CartService.java b/src/main/java/com/demo/CartService.java
  index 1111111..2222222 100644
  --- a/src/main/java/com/demo/CartService.java
  +++ b/src/main/java/com/demo/CartService.java
  @@ -12,6 +12,12 @@ public class CartService {
  +
  +    public void removeExpired(List<Item> items) {
  +        for (Item item : items) {
  +            if (item.isExpired()) {
  +                items.remove(item);
  +            }
  +        }
  +    }
   }
expected:
  - type_keywords: ["并发修改", "concurrentmodification", "遍历", "remove", "迭代"]
    file: CartService.java
    line: 16
    severity: CRITICAL
    note: 增强 for 循环内对同一集合 remove 会抛 ConcurrentModificationException,应使用 Iterator.remove 或 removeIf
