id: off_by_one_001
category: 数组越界
dimension: logic
language: java
description: 循环条件用 <= length 导致最后一次访问越界,必抛 ArrayIndexOutOfBounds
diff: |
  diff --git a/src/main/java/com/demo/MatrixUtil.java b/src/main/java/com/demo/MatrixUtil.java
  index 1111111..2222222 100644
  --- a/src/main/java/com/demo/MatrixUtil.java
  +++ b/src/main/java/com/demo/MatrixUtil.java
  @@ -7,6 +7,12 @@ public class MatrixUtil {
  +
  +    public int sum(int[] values) {
  +        int total = 0;
  +        for (int i = 0; i <= values.length; i++) {
  +            total += values[i];
  +        }
  +        return total;
  +    }
   }
expected:
  - type_keywords: ["越界", "off-by-one", "index", "outofbounds", "边界"]
    file: MatrixUtil.java
    line: 11
    severity: CRITICAL
    note: 循环条件应为 i < values.length,<= 会在 i==length 时越界
