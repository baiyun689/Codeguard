  @@ -7,6 +7,9 @@ public class TokenService {
       public String newToken() {
  +        Random r = new Random();
  +        long v = r.nextLong();
  +        return Long.toHexString(v);
       }
   }
expected:
  - type_keywords: ["随机", "random", "securerandom", "可预测", "弱"]
