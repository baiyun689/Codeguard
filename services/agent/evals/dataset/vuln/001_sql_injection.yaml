id: sql_injection_001
category: SQL注入
language: java
description: 用户输入直接字符串拼接进 SQL 语句
diff: |
  diff --git a/src/main/java/com/demo/UserDao.java b/src/main/java/com/demo/UserDao.java
  index 1111111..2222222 100644
  --- a/src/main/java/com/demo/UserDao.java
  +++ b/src/main/java/com/demo/UserDao.java
  @@ -10,6 +10,11 @@ public class UserDao {
       public User findByName(String name) throws SQLException {
  -        return template.queryForObject("SELECT * FROM users WHERE id = ?", name);
  +        Statement stmt = connection.createStatement();
  +        String sql = "SELECT * FROM users WHERE name = '" + name + "'";
  +        ResultSet rs = stmt.executeQuery(sql);
  +        rs.next();
  +        return mapRow(rs);
       }
   }
expected:
  - type_keywords: ["sql", "注入", "injection"]
    file: UserDao.java
    line: 13
    severity: CRITICAL
    note: name 直接拼进 SQL,应使用 PreparedStatement 参数化
  - type_keywords: ["资源泄漏", "未关闭", "leak", "close", "stream", "statement", "resultset"]
    file: UserDao.java
    line: 13
    severity: WARNING
    note: Statement/ResultSet 未在 try-with-resources 或 finally 中关闭,异常路径下泄漏数据库资源
  - type_keywords: ["rs.next", "返回值", "未检查", "空结果", "next"]
    file: UserDao.java
    line: 14
    severity: WARNING
    note: rs.next() 返回值被忽略,查询无结果时 mapRow(rs) 会读取无效游标抛 SQLException
