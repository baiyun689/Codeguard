id: ssrf_001
category: SSRF
language: java
description: 用用户传入的 URL 直接发起请求
diff: |
  diff --git a/src/main/java/com/demo/FetchService.java b/src/main/java/com/demo/FetchService.java
  index 1111111..2222222 100644
  --- a/src/main/java/com/demo/FetchService.java
  +++ b/src/main/java/com/demo/FetchService.java
  @@ -9,6 +9,9 @@ public class FetchService {
       public String fetch(String url) throws IOException {
  +        URL u = new URL(url);
  +        try (InputStream in = u.openStream()) {
  +            return new String(in.readAllBytes());
  +        }
       }
   }
expected:
  - type_keywords: ["ssrf", "请求伪造", "url"]
    file: FetchService.java
    line: 11
    severity: WARNING
    note: 未校验目标地址,可被用于访问内网(SSRF)
