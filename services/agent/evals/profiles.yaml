# 被测目标 profile 清单(评测的"被测系统"维度)。
#
# 一个 profile = mode(pipeline) + 启用工具集 + 可选模型覆盖 + 是否开误报复核(fp_verify)。
# 加一个工具 / 换一种编排 / 开关误报复核 = 在此加一行,数据集与指标零改动(见 design.md D3)。
# 用法:python -m evals.runner --profile pipeline-file
# 不指定 --profile 时,用 --tools 合成 ad-hoc profile(管线 + 工具开/关)。

profiles:
  # 管线但不开工具:并行三审查员直连(无工具对照基准)。
  pipeline-notools:
    mode: pipeline
    tools: []

  # 管线 + 误报复核:在 pipeline-notools 基础上打开误报过滤第二段的独立异源 LLM 复核。
  # 与 pipeline-notools 仅差 fp_verify 这一个变量,用于量化"独立复核员"对 Precision/误报率的净增益
  # (复核只删不增,需同时盯 Recall 是否被误删拖低)。需配 CODEGUARD_JUDGE_* 异源模型。
  pipeline-fpverify:
    mode: pipeline
    tools: []
    fp_verify: true

  # 管线 + 文件工具:审查员走 ReAct,可调 get_file_content 读 diff 之外的文件。
  # 与 pipeline-notools 仅差"是否开工具"这一个变量,用于量化 file 能力的工具增益。
  pipeline-file:
    mode: pipeline
    tools: [get_file_content]

  # 管线 + repo map 导航 + 文件细读:审查员可先 get_repo_map 定位 diff 之外的定义文件,再 get_file_content 读。
  # 与 pipeline-file 相比多了"跨文件导航"能力,用于量化 repo-map 难例(跨文件、需先定位)的增益。
  pipeline-repomap:
    mode: pipeline
    tools: [get_repo_map, get_file_content]

  # 管线 + repo map 导航/细读 + 误报复核:在 pipeline-repomap 基础上打开误报复核。
  # 与 pipeline-repomap 仅差 fp_verify 一个变量,用于量化"把审查员读到的 diff 外上下文
  # 喂给复核员"后,复核是否不再误删跨文件真问题(见 fp-verify-reviewer-context)。需起 gateway + 异源模型。
  pipeline-repomap-fpverify:
    mode: pipeline
    tools: [get_repo_map, get_file_content]
    fp_verify: true

  # —— 扩展占位(零成本预留,框架无需改动)——
  # 后续逐个加重型工具时,在此追加 profile 即可:
  # pipeline-ast:    { mode: pipeline, tools: [get_file_content, get_method_definition] }
  # pipeline-graph:  { mode: pipeline, tools: [get_file_content, get_call_graph] }
  # pipeline-rag:    { mode: pipeline, tools: [get_file_content, semantic_search] }
  #
  # 将来引入规则引擎检测器(后续独立 change)时,亦表现为新增 profile:
  # rules-only:      { mode: pipeline, tools: [] }      # 仅规则检测
  # rules+llm:       { mode: pipeline, tools: [get_file_content] }  # 规则 + LLM 并联
