<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codeguard Trace Viewer</title>
<style>
* { box-sizing: border-box; }
:root {
  --bg: #171925; --panel: #24283b; --panel2: #1e2233;
  --border: #414868; --text: #c0caf5; --dim: #7982a9;
  --blue: #7aa2f7; --green: #9ece6a; --orange: #e0af68;
  --purple: #bb9af7; --cyan: #7dcfff; --red: #f7768e;
}
body {
  margin: 0; height: 100vh; display: flex; flex-direction: column;
  font-family: "Segoe UI", system-ui, sans-serif; font-size: 13px;
  color: var(--text); background: var(--bg);
}
.header {
  padding: 10px 16px; flex-shrink: 0; background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.header h1 { display: inline; margin: 0 18px 0 0; color: var(--blue); font-size: 16px; }
.meta { color: var(--dim); font-size: 11px; }
.filters {
  display: flex; gap: 8px; align-items: center; padding: 7px 16px;
  flex-shrink: 0; background: var(--panel); border-bottom: 1px solid var(--border);
}
.filters input, .filters select {
  color: var(--text); background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 8px; font-size: 12px;
}
.filters input { width: 260px; }
.main { display: flex; flex: 1; min-height: 0; }
.topology {
  width: 330px; padding: 12px; overflow: auto; flex-shrink: 0;
  background: var(--panel); border-right: 1px solid var(--border);
}
.topology-title {
  margin: 2px 0 10px; color: var(--dim); font-size: 10px;
  text-transform: uppercase; letter-spacing: .08em;
}
.topo-node {
  margin: 4px 0; padding: 7px 9px; cursor: pointer;
  border: 1px solid transparent; border-left: 3px solid var(--blue);
  border-radius: 5px; background: var(--panel2);
}
.topo-node:hover { border-color: var(--border); border-left-color: var(--blue); }
.topo-node .path { overflow-wrap: anywhere; font-weight: 600; }
.topo-node .stats { margin-top: 3px; color: var(--dim); font-size: 10px; }
.timeline { flex: 1; overflow: auto; padding: 12px; }
.empty { padding: 24px; color: var(--dim); text-align: center; }
.event {
  margin: 3px 0; overflow: hidden; border: 1px solid transparent;
  border-radius: 5px; background: rgba(36, 40, 59, .45);
}
.event:hover { border-color: var(--border); }
.event.node_start { border-left: 3px solid var(--blue); }
.event.node_end { border-left: 3px solid var(--green); }
.event.llm_start, .event.llm_end { border-left: 3px solid var(--purple); }
.event.tool_start, .event.tool_end { border-left: 3px solid var(--orange); }
.event.route_decision { border-left: 3px solid var(--cyan); }
.event.error, .event.fallback { border-left: 3px solid var(--red); }
.event-header {
  display: flex; gap: 8px; align-items: center; padding: 7px 9px;
  cursor: pointer;
}
.event-header .time { width: 74px; flex-shrink: 0; color: var(--dim); font: 11px monospace; }
.event-header .icon { width: 18px; text-align: center; }
.event-header .summary { flex: 1; min-width: 0; overflow-wrap: anywhere; }
.badge {
  max-width: 44%; padding: 2px 6px; overflow: hidden; border-radius: 3px;
  color: var(--dim); background: var(--bg); font-size: 10px;
  text-overflow: ellipsis; white-space: nowrap;
}
.event-body {
  display: none; padding: 8px 12px 12px 34px;
  border-top: 1px solid var(--border); background: rgba(0, 0, 0, .12);
}
.event.open .event-body { display: block; }
.detail-block { margin: 5px 0; border: 1px solid var(--border); border-radius: 4px; }
.detail-block > summary {
  padding: 6px 8px; cursor: pointer; color: var(--cyan); background: var(--panel2);
}
.detail-block pre {
  max-height: 520px; margin: 0; padding: 9px; overflow: auto;
  color: #d5dcff; background: #12141e; font: 11px/1.45 Consolas, monospace;
  white-space: pre-wrap; overflow-wrap: anywhere;
}
.message-role { color: var(--purple); }
.tokens { margin-top: 7px; color: var(--dim); font-size: 11px; }
.token-bar {
  display: flex; gap: 16px; align-items: center; padding: 8px 16px;
  flex-shrink: 0; overflow-x: auto; background: var(--panel);
  border-top: 1px solid var(--border); white-space: nowrap;
}
.token-total { color: var(--blue); font-weight: 700; }
.token-chip { padding: 3px 8px; border-radius: 10px; background: var(--bg); font-size: 11px; }
#error { padding: 24px; color: var(--red); font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="header">
  <h1>Codeguard Trace Viewer</h1>
  <span class="meta" id="meta"></span>
</div>
<div class="filters">
  <input id="search" type="text" placeholder="搜索 State、Prompt、工具结果…" oninput="renderTimeline()">
  <select id="type-filter" onchange="renderTimeline()">
    <option value="">全部事件</option>
    <option value="node_start">node_start</option>
    <option value="node_end">node_end</option>
    <option value="llm_start">llm_start</option>
    <option value="llm_end">llm_end</option>
    <option value="tool_start">tool_start</option>
    <option value="tool_end">tool_end</option>
    <option value="route_decision">route_decision</option>
    <option value="error">error</option>
  </select>
  <select id="path-filter" onchange="renderTimeline()">
    <option value="">全部路径</option>
  </select>
  <label><input id="expand-all" type="checkbox" onchange="renderTimeline()"> 展开全部</label>
</div>
<div class="main" id="main">
  <div class="topology" id="topology"></div>
  <div class="timeline" id="timeline"></div>
</div>
<div class="token-bar" id="token-bar"></div>
<script id="trace-data" type="application/json">__TRACE_DATA__</script>
<script>
(function () {
  "use strict";
  try {
    var DATA = JSON.parse(document.getElementById("trace-data").textContent);
    var EVENTS = DATA.events || [];
    var SUMMARY = DATA.summary || {};
    window.renderTimeline = renderTimeline;
    renderMeta();
    renderTopology();
    populatePathFilter();
    renderTokenBar();
    renderTimeline();
  } catch (error) {
    showError("渲染错误: " + error.message + "\n" + (error.stack || ""));
  }

  function esc(value) {
    var element = document.createElement("div");
    element.textContent = value == null ? "" : String(value);
    return element.innerHTML;
  }

  function pretty(value) {
    try { return JSON.stringify(value, null, 2); }
    catch (error) { return String(value); }
  }

  function formatMs(value) {
    var ms = Number(value || 0);
    return ms < 1000 ? ms.toFixed(1) + "ms" : (ms / 1000).toFixed(2) + "s";
  }

  function formatTokens(value) {
    var count = Number(value || 0);
    return count >= 1000 ? (count / 1000).toFixed(1) + "K" : String(count);
  }

  function eventPath(event) {
    return event.node_path || event.node_name || "unknown";
  }

  function renderJsonValue(title, value, open) {
    if (typeof value === "undefined") { return ""; }
    return '<details class="detail-block"' + (open ? " open" : "") + ">" +
      "<summary>" + esc(title) + "</summary><pre>" +
      esc(pretty(value)) + "</pre></details>";
  }

  function renderMeta() {
    var total = (SUMMARY.total_tokens || {}).total_tokens || 0;
    document.getElementById("meta").textContent =
      "Run: " + DATA.run_id + " | " + DATA.timestamp +
      " | Diff: " + DATA.diff_size + " 字符 | 事件: " + EVENTS.length +
      " | 耗时: " + formatMs(SUMMARY.total_duration_ms) +
      " | Token: " + formatTokens(total);
  }

  function renderTopology() {
    var container = document.getElementById("topology");
    var timeline = SUMMARY.node_timeline || [];
    container.innerHTML = '<div class="topology-title">实际节点实例</div>';
    if (!timeline.length) {
      container.innerHTML += '<div class="empty">没有节点事件</div>';
      return;
    }
    for (var index = 0; index < timeline.length; index += 1) {
      var node = timeline[index];
      var element = document.createElement("div");
      element.className = "topo-node";
      element.setAttribute("data-invocation", node.invocation_id || node.run_id || "");
      element.innerHTML =
        '<div class="path">' + esc(node.node_path || node.node_name) + "</div>" +
        '<div class="stats">depth ' + Number(node.depth || 0) +
        " · " + formatMs(node.duration_ms) +
        " · LLM " + Number(node.llm_calls || 0) +
        " · Tool " + Number(node.tool_calls || 0) +
        " · Token " + formatTokens((node.tokens || {}).total_tokens) + "</div>";
      element.onclick = makeTopologyClick(
        node.invocation_id || node.run_id || ""
      );
      container.appendChild(element);
    }
  }

  function makeTopologyClick(invocationId) {
    return function () {
      var nodes = document.querySelectorAll(".event");
      for (var index = 0; index < nodes.length; index += 1) {
        if (nodes[index].getAttribute("data-invocation") === invocationId) {
          nodes[index].scrollIntoView({behavior: "smooth", block: "center"});
          nodes[index].classList.add("open");
          return;
        }
      }
    };
  }

  function populatePathFilter() {
    var paths = {};
    var select = document.getElementById("path-filter");
    for (var index = 0; index < EVENTS.length; index += 1) {
      paths[eventPath(EVENTS[index])] = true;
    }
    Object.keys(paths).sort().forEach(function (path) {
      var option = document.createElement("option");
      option.value = path;
      option.textContent = path;
      select.appendChild(option);
    });
  }

  function eventIcon(type) {
    var icons = {
      node_start: "▶", node_end: "■", llm_start: "💬", llm_end: "✓",
      tool_start: "🔧", tool_end: "📋", route_decision: "↗",
      fallback: "⚠", error: "❌"
    };
    return icons[type] || "•";
  }

  function renderMessages(messages) {
    var html = "";
    for (var index = 0; index < (messages || []).length; index += 1) {
      var message = messages[index];
      html += renderJsonValue(
        "消息 " + (index + 1) + " · " + (message.role || "unknown"),
        message,
        true
      );
    }
    return html;
  }

  function renderEventBody(event) {
    var detail = event.detail || {};
    var html = "";
    if (event.event_type === "node_start") {
      html += renderJsonValue("节点输入", detail.input, true);
    } else if (event.event_type === "node_end") {
      html += renderJsonValue("节点输入", detail.input, false);
      html += renderJsonValue("节点输出", detail.output, true);
    } else if (event.event_type === "llm_start") {
      html += renderMessages(detail.messages || []);
      html += renderJsonValue("LLM 调用元数据", detail.metadata, false);
    } else if (event.event_type === "llm_end") {
      html += renderJsonValue("LLM 响应", detail.response, true);
      html += renderJsonValue("LLM 调用元数据", detail.metadata, false);
    } else if (event.event_type === "tool_start") {
      html += renderJsonValue("工具输入", detail.input, true);
    } else if (event.event_type === "tool_end") {
      html += renderJsonValue("工具输出", detail.output, true);
    } else if (event.event_type === "route_decision") {
      html += renderJsonValue("路由决策", detail, true);
    }
    if (event.tokens) {
      html += '<div class="tokens">Input ' +
        Number(event.tokens.input_tokens || 0) + " · Output " +
        Number(event.tokens.output_tokens || 0) + " · Total " +
        Number(event.tokens.total_tokens || 0) + "</div>";
    }
    html += renderJsonValue("原始 JSON", event, false);
    return html;
  }

  function shouldShow(event, search, type, path) {
    if (type && event.event_type !== type) { return false; }
    if (path && eventPath(event) !== path) { return false; }
    if (!search) { return true; }
    return pretty(event).toLowerCase().indexOf(search) >= 0;
  }

  function renderTimeline() {
    var container = document.getElementById("timeline");
    var search = document.getElementById("search").value.toLowerCase();
    var type = document.getElementById("type-filter").value;
    var path = document.getElementById("path-filter").value;
    var expandAll = document.getElementById("expand-all").checked;
    var shown = 0;
    container.innerHTML = "";

    for (var index = 0; index < EVENTS.length; index += 1) {
      var event = EVENTS[index];
      if (!shouldShow(event, search, type, path)) { continue; }
      shown += 1;
      var element = document.createElement("div");
      var depth = Math.min(Number(event.depth || 0), 6);
      element.className = "event " + event.event_type;
      element.style.marginLeft = (depth * 16) + "px";
      element.setAttribute("data-invocation", event.invocation_id || "");
      if (
        expandAll ||
        event.event_type === "node_start" ||
        event.event_type === "node_end"
      ) {
        element.classList.add("open");
      }
      element.innerHTML =
        '<div class="event-header"><span class="time">' +
        formatMs(event.timestamp_ms) + '</span><span class="icon">' +
        eventIcon(event.event_type) + '</span><span class="summary">' +
        esc(event.summary) + '</span><span class="badge" title="' +
        esc(eventPath(event)) + '">' + esc(eventPath(event)) +
        '</span></div><div class="event-body">' +
        renderEventBody(event) + "</div>";
      element.querySelector(".event-header").onclick = function () {
        this.parentElement.classList.toggle("open");
      };
      container.appendChild(element);
    }
    if (!shown) {
      container.innerHTML = '<div class="empty">没有匹配事件</div>';
    }
  }

  function renderTokenBar() {
    var container = document.getElementById("token-bar");
    var total = SUMMARY.total_tokens || {};
    var byNode = SUMMARY.tokens_by_node || {};
    var html = '<span class="token-total">总计 ' +
      formatTokens(total.total_tokens) + " tokens</span>";
    Object.keys(byNode).sort().forEach(function (path) {
      html += '<span class="token-chip">' + esc(path) + " · " +
        formatTokens(byNode[path].total_tokens) + "</span>";
    });
    container.innerHTML = html;
  }

  function showError(message) {
    document.getElementById("main").innerHTML =
      '<div id="error">' + esc(message) + "</div>";
  }
})();
</script>
</body>
</html>
