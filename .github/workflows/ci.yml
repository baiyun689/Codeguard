name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Verify Python Agent
        working-directory: services/agent
        run: |
          uv sync --group dev
          uv run pytest tests/ -q
          uv run ruff check src/
          uv run mypy src/
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify Java Gateway
        working-directory: services/gateway
        run: mvn --batch-mode verify
      - name: Build container
        run: docker build -t codeguard:ci .
      - name: Smoke test container
        run: |
          docker run -d --name codeguard-smoke -p 19090:9090 \
            -e CODEGUARD_PROVIDER=mock codeguard:ci
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://localhost:19090/health/ready >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs codeguard-smoke
              exit 1
            fi
            sleep 1
          done
          curl --fail http://localhost:19090/health/live
          curl --fail http://localhost:19090/health/ready
      - name: Clean up smoke container
        if: always()
        run: docker rm -f codeguard-smoke || true
