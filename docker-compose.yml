services:
  codeguard:
    build: .
    ports:
      - "9090:9090"
    environment:
      # GitHub App (CI)
      - CODEGUARD_WEBHOOK_SECRET=${CODEGUARD_WEBHOOK_SECRET:-}
      - CODEGUARD_GITHUB_APP_ID=${CODEGUARD_GITHUB_APP_ID:-}
      - CODEGUARD_GITHUB_PRIVATE_KEY=${CODEGUARD_GITHUB_PRIVATE_KEY:-}
      # LLM
      - CODEGUARD_PROVIDER=${CODEGUARD_PROVIDER:-openai}
      - CODEGUARD_API_KEY=${CODEGUARD_API_KEY:-}
      - CODEGUARD_MODEL=${CODEGUARD_MODEL:-}
      # Review config
      - CODEGUARD_TOOL_SERVER_URL=http://localhost:9090
      - CODEGUARD_MAX_CONCURRENT_REVIEWS=${CODEGUARD_MAX_CONCURRENT_REVIEWS:-2}
      - CODEGUARD_REVIEW_TIMEOUT_SECONDS=${CODEGUARD_REVIEW_TIMEOUT_SECONDS:-600}
      - CODEGUARD_RETRY_DELAY_SECONDS=${CODEGUARD_RETRY_DELAY_SECONDS:-30}
      - CODEGUARD_SHUTDOWN_GRACE_SECONDS=${CODEGUARD_SHUTDOWN_GRACE_SECONDS:-30}
      - CODEGUARD_JOB_DB_PATH=/app/data/codeguard-jobs
      - CODEGUARD_WORKSPACE_DIR=/tmp/codeguard-jobs
      - CODEGUARD_WEBHOOK_RATE_LIMIT=${CODEGUARD_WEBHOOK_RATE_LIMIT:-30}
    volumes:
      - gateway-data:/app/data
      - job-workspaces:/tmp/codeguard-jobs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gateway-data:
  job-workspaces:
